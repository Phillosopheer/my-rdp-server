name: RDP
on: workflow_dispatch
jobs:
  secure-rdp:
    runs-on: windows-latest
    steps:
      - name: Configure RDP
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0
      
      - name: Create User
        run: |
          $pass = ConvertTo-SecureString "Lasha12345!" -AsPlainText -Force
          New-LocalUser -Name "RDP" -Password $pass -AccountNeverExpires
          Add-LocalGroupMember -Group "Administrators" -Member "RDP"
          
      - name: Tailscale
        run: |
          Invoke-WebRequest https://pkgs.tailscale.com/stable/tailscale-setup-latest.exe -OutFile ts.exe
          Start-Process .\ts.exe -ArgumentList "/quiet" -Wait
          & "C:\Program Files\Tailscale\tailscale.exe" up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }}
          
      - name: Keep Alive
        run: |
          $ip = & "C:\Program Files\Tailscale\tailscale.exe" ip -4
          echo "ADDRESS: $ip"
          while ($true) { Start-Sleep -Seconds 300 }
